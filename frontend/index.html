<!DOCTYPE html>
<html>

    <title>Digit Recognizer</title>
</head>
<body>

    <h2>Draw a digit</h2>

    <canvas id="canvas" width="280" height="280" style="border:1px solid black;"></canvas>

    <br><br>

    <button onclick="clearCanvas()">Clear</button>

    <h3>Conv1 Feature Maps</h3>

    <!-- ONNX Runtime -->

    <!-- Your script -->
    <script src="app.js"></script>
